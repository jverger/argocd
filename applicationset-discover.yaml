apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: auto-discovery
  namespace: argocd
  # Supprime automatiquement les Applications générées quand l’ApplicationSet est supprimé.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  generators:
    - git:
        # Ajout du suffixe .git : évite certains redirects HTTP et améliore
        # la compatibilité avec les clients Git.
        repoURL: &repoURL https://github.com/jverger/argocd.git
        revision: &revision main
        directories:
          # Découvre tous les sous-dossiers de config-repo/services/
          # (ex: config-repo/services/mon-api)
          - path: config-repo/services/*
  template:
    metadata:
      # Nom d’Application stable et explicite.
      # Exemple: svc-mon-api
      name: "svc-{{path.basename}}"
      labels:
        app.kubernetes.io/managed-by: argocd-applicationset
        app.kubernetes.io/part-of: services
        argocd.argoproj.io/instance: auto-discovery
    spec:
      project: default
      source:
        repoURL: *repoURL
        targetRevision: *revision
        # `path` vaut déjà `config-repo/services/<name>`.
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          # Permet d’éviter des diffs sur des champs gérés côté serveur.
          - ServerSideApply=true
          # Ordonne la suppression (réduction de problèmes de dépendances).
          - PruneLast=true