apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: auto-discovery
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/jverger/argocd
        revision: main
        directories:
          - path: services/*   # ← découvre tous les sous-dossiers de services/
  template:
    metadata:
      name: "{{path.basename}}"   # ← nom du dossier découvert
    spec:
      project: default
      source:
        repoURL: https://github.com/jverger/argocd
        targetRevision: main
        path: "config-repo/{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true