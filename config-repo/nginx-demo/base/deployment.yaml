apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1    # Valeur par défaut, écrasée dans chaque overlay
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
